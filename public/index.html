<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onebody Church | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    data-page="home"
    data-gsap-page
    class="flex min-h-screen flex-col antialiased selection:bg-blue-100 selection:text-blue-900"
  >
    <div id="page-transition" aria-hidden="true" style="position:fixed;inset:0;z-index:10000;background-color:#111111;display:flex;align-items:center;justify-content:center;">
      <div id="page-transition-logo">
        <img src="/onebody-logo.png" alt="" />
        <span class="pt-wordmark">Onebody</span>
      </div>
    </div>
    <site-header current="home" visit-href="./services.html#visit"></site-header>

    <main class="flex flex-1 flex-col">
      <section
        data-home-hero
        class="relative isolate flex flex-1 items-center justify-center overflow-hidden px-6 pb-16 pt-32 md:px-12 md:pb-20 md:pt-40"
      >
        <div
          class="pointer-events-none absolute inset-0 -z-10 h-full w-full bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px] [mask-image:radial-gradient(ellipse_72%_56%_at_50%_0%,#000_70%,transparent_100%)] [-webkit-mask-image:radial-gradient(ellipse_72%_56%_at_50%_0%,#000_70%,transparent_100%)]"
        ></div>

        <div class="relative z-10 mx-auto w-full max-w-5xl text-center">
          <h1 class="text-5xl font-medium leading-[1.02] tracking-tighter text-stone-900 md:text-7xl lg:text-8xl">
            Love is changing hearts,
            <span class="text-stone-400">lighting eyes,</span>
            moving hands and
            <span class="font-serif italic text-red-600">leading feet.</span>
          </h1>

          <p class="mx-auto mt-8 max-w-2xl text-lg leading-relaxed text-stone-500 md:text-xl">
            Onebody is a Jesus-centered church in Yaba where worship, teaching, discipleship, and service shape how we
            gather and how we love our city.
          </p>

          <div class="mt-10 flex flex-wrap items-center justify-center gap-4">
            <a
              href="./sermons.html#featured-message"
              class="inline-flex items-center gap-2 rounded-full border border-stone-200 bg-white px-7 py-3 text-base font-medium text-stone-900 transition-colors hover:border-stone-300 hover:bg-stone-50"
            >
              Watch a Message
              <i data-lucide="play-circle" class="h-4 w-4" stroke-width="1.5"></i>
            </a>
          </div>

        </div>
      </section>

      <marquee-strip></marquee-strip>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
